<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#2A1A50"/>
      <stop offset="30%" stop-color="#5B3E80"/>
      <stop offset="55%" stop-color="#FF7A9C"/>
      <stop offset="78%" stop-color="#FFB088"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="78%" r="38%">
      <stop offset="0%"   stop-color="#FFF8D0" stop-opacity="0.95"/>
      <stop offset="60%"  stop-color="#FFD54F" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- rounded square alpenglow sky -->
  <rect width="512" height="512" rx="115" fill="url(#sky)"/>
  <!-- soft sun glow at horizon -->
  <circle cx="256" cy="400" r="190" fill="url(#sunGlow)"/>
  <!-- far peaks (hazy) -->
  <path d="M0 340 L70 260 L130 300 L200 220 L260 275 L330 210 L400 260 L460 230 L512 290 L512 512 L0 512 Z" fill="#1A1028" opacity="0.45"/>
  <!-- mid peaks -->
  <path d="M0 400 L60 330 L120 360 L195 290 L265 350 L340 275 L420 340 L480 305 L512 340 L512 512 L0 512 Z" fill="#0D0818" opacity="0.78"/>
  <!-- foreground peaks (darkest) -->
  <path d="M0 455 L80 385 L160 435 L230 380 L320 440 L400 375 L470 425 L512 415 L512 512 L0 512 Z" fill="#000"/>
  <!-- stars -->
  <g fill="#FFFAF0">
    <circle cx="80"  cy="70"  r="2.6"/>
    <circle cx="420" cy="55"  r="3"/>
    <circle cx="200" cy="40"  r="2"/>
    <circle cx="350" cy="100" r="2.5"/>
    <circle cx="130" cy="115" r="1.8"/>
    <circle cx="470" cy="140" r="2"/>
  </g>
</svg>
