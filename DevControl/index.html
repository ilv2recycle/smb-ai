<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DevControl - Monique</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap">
  <link rel="stylesheet" href="../styles/site.css">
  <link rel="stylesheet" href="../styles/tailwind.out.css">
  <link rel="stylesheet" href="devcontrol.css">
  <style>
    /* Instant-load: hide app until auth resolves */
    .hidden { display: none !important; }
    #loadingOverlay {
      position: fixed; inset: 0;
      background: #f6f5f0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 1000;
      transition: opacity 0.2s ease-out;
    }
    #loadingOverlay .spinner {
      width: 32px; height: 32px;
      border: 3px solid #e6e2d9;
      border-top-color: #4a7c59;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loading overlay -->
  <div id="loadingOverlay">
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4a7c59" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8C17 5.24 14.76 3 12 3S7 5.24 7 8c0 1.65.8 3.12 2.04 4.04L7 20h10l-2.04-7.96A5.002 5.002 0 0 0 17 8z"/></svg>
      <span style="font-family:'DM Sans',sans-serif;font-size:1.125rem;font-weight:700;color:#1f1720;">DevControl</span>
    </div>
    <div class="spinner"></div>
  </div>

  <!-- Toast container -->
  <div id="toastContainer" style="position:fixed;top:1rem;right:1rem;z-index:9999;display:flex;flex-direction:column;gap:0.5rem;"></div>

  <!-- Main app (hidden until auth) -->
  <div id="appContent" class="hidden">
    <!-- Top navigation bar -->
    <header class="dc-header">
      <div class="dc-header__inner">
        <a href="/" class="dc-header__logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8C17 5.24 14.76 3 12 3S7 5.24 7 8c0 1.65.8 3.12 2.04 4.04L7 20h10l-2.04-7.96A5.002 5.002 0 0 0 17 8z"/></svg>
          DevControl
        </a>
        <div class="dc-header__auth" id="headerAuth"></div>
      </div>
    </header>

    <span data-site-version style="display:none;">v260409.02 12:24a</span>

    <!-- Tab navigation -->
    <nav class="dc-tabs" id="tabNav">
      <button class="dc-tab active" data-tab="overview">Overview</button>
      <button class="dc-tab" data-tab="releases">Releases</button>
      <button class="dc-tab" data-tab="sessions">Sessions</button>
      <button class="dc-tab" data-tab="tokens">Tokens</button>
      <button class="dc-tab" data-tab="context">Context</button>
      <button class="dc-tab" data-tab="backups">Backups</button>
      <button class="dc-tab" data-tab="planlist">PlanList</button>
    </nav>

    <!-- Content panels -->
    <main class="dc-main">
      <div id="dc-panel-overview" class="dc-panel"></div>
      <div id="dc-panel-releases" class="dc-panel" style="display:none"></div>
      <div id="dc-panel-sessions" class="dc-panel" style="display:none"></div>
      <div id="dc-panel-tokens" class="dc-panel" style="display:none"></div>
      <div id="dc-panel-context" class="dc-panel" style="display:none"></div>
      <div id="dc-panel-backups" class="dc-panel" style="display:none"></div>
      <div id="dc-panel-planlist" class="dc-panel" style="display:none"></div>
    </main>
  </div>

  <script src="/vendor/supabase-js-2.39.3.min.js"></script>
  <script type="module" src="../shared/version-info.js"></script>
  <script type="module" src="devcontrol.js"></script>
</body>
</html>
