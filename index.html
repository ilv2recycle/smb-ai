<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap">
  <title>Monique</title>
  <meta name="description" content="Monique - AI-powered development tools">
  <link rel="stylesheet" href="/styles/site.css">
  <link rel="stylesheet" href="/styles/tailwind.out.css">
  <style>
    :root {
      --dc-bg: #f6f5f0;
      --dc-text: #1f1720;
      --dc-text-muted: #7d6f74;
      --dc-border: #e6e2d9;
      --dc-accent: #4a7c59;
      --dc-card-bg: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--dc-bg);
      color: var(--dc-text);
      min-height: 100vh;
    }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 48px;
      background: #fff;
      border-bottom: 1px solid var(--dc-border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .top-bar__left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .top-bar__logo {
      font-weight: 700;
      font-size: 1rem;
      color: var(--dc-text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .top-bar__logo svg {
      color: var(--dc-accent);
    }
    .top-bar__version {
      font-size: 0.6875rem;
      color: var(--dc-text-muted);
      background: #f0ede8;
      padding: 0.125rem 0.5rem;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .top-bar__right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .top-bar__sign-in {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--dc-text);
      text-decoration: none;
      padding: 0.375rem 1rem;
      border: 1px solid var(--dc-border);
      border-radius: 8px;
      transition: all 0.15s;
    }
    .top-bar__sign-in:hover {
      border-color: var(--dc-accent);
      color: var(--dc-accent);
    }
    .top-bar__user {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      font-size: 0.8125rem;
      color: var(--dc-text-muted);
    }
    .top-bar__user-email {
      font-size: 0.8125rem;
      color: var(--dc-text-muted);
    }
    .top-bar__sign-out {
      font-size: 0.8125rem;
      color: var(--dc-text-muted);
      background: none;
      border: 1px solid var(--dc-border);
      border-radius: 6px;
      padding: 0.25rem 0.75rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .top-bar__sign-out:hover {
      border-color: #c62828;
      color: #c62828;
    }
    .hero-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 48px);
      text-align: center;
      padding: 3rem 1.5rem;
    }
    .hero-title {
      font-size: 4rem;
      font-weight: 700;
      color: var(--dc-text);
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .hero-subtitle {
      font-size: 1.125rem;
      color: var(--dc-text-muted);
      max-width: 480px;
      line-height: 1.6;
    }
    .hero-nav {
      margin-top: 2.5rem;
      display: flex;
      gap: 1rem;
    }
    .hero-nav a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      font-size: 0.9375rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s;
    }
    .hero-nav__primary {
      background: var(--dc-accent);
      color: #fff;
    }
    .hero-nav__primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .hero-nav__secondary {
      background: var(--dc-card-bg);
      color: var(--dc-text);
      border: 1px solid var(--dc-border);
    }
    .hero-nav__secondary:hover {
      border-color: var(--dc-accent);
    }
    @media (max-width: 600px) {
      .hero-title { font-size: 2.5rem; }
      .hero-nav { flex-direction: column; }
    }
  </style>
</head>
<body>
  <span data-site-version style="display:none;">v260409.02 12:24a</span>

  <!-- Top Navigation Bar -->
  <div class="top-bar">
    <div class="top-bar__left">
      <a href="/" class="top-bar__logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8C17 5.24 14.76 3 12 3S7 5.24 7 8c0 1.65.8 3.12 2.04 4.04L7 20h10l-2.04-7.96A5.002 5.002 0 0 0 17 8z"/><path d="M12 3c-.6 0-1.17.1-1.7.28"/></svg>
        Monique
      </a>
      <span class="top-bar__version" id="versionBadge"></span>
    </div>
    <div class="top-bar__right" id="authArea">
      <a href="/login/" class="top-bar__sign-in" id="signInLink">Sign in</a>
    </div>
  </div>

  <!-- Hero Section -->
  <section class="hero-section">
    <h1 class="hero-title">Monique</h1>
    <p class="hero-subtitle">AI-powered property management and development tools</p>
    <div class="hero-nav" id="heroNav">
      <a href="/login/" class="hero-nav__primary" id="heroGetStarted">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Get Started
      </a>
      <a href="/spaces/" class="hero-nav__secondary">
        View Spaces
      </a>
    </div>
  </section>

  <script src="/vendor/supabase-js-2.39.3.min.js"></script>
  <script>
    // Version badge (sync, before module scripts)
    (function() {
      var vEl = document.querySelector('[data-site-version]');
      var vBadge = document.getElementById('versionBadge');
      if (vEl && vBadge) {
        var v = vEl.textContent.trim();
        if (v) vBadge.textContent = v;
      }
    })();
  </script>
  <script type="module" src="shared/version-info.js"></script>
  <script type="module">
    import { initAuth, getAuthState, signOut } from './shared/auth.js';

    // Auth state
    await initAuth();
    const state = getAuthState();
    const authArea = document.getElementById('authArea');
    const signInLink = document.getElementById('signInLink');
    const heroGetStarted = document.getElementById('heroGetStarted');

    if (state.isAuthenticated && state.appUser) {
      const email = state.appUser.email || state.appUser.display_name || '';
      authArea.innerHTML = `
        <span class="top-bar__user-email">${email}</span>
        <button class="top-bar__sign-out" id="signOutBtn">Sign out</button>
      `;
      document.getElementById('signOutBtn')?.addEventListener('click', async () => {
        await signOut();
        window.location.reload();
      });

      // If admin/oracle/staff, show DevControl link
      const role = state.appUser.role || '';
      if (['admin', 'oracle', 'staff'].includes(role)) {
        heroGetStarted.href = '/DevControl/';
        heroGetStarted.innerHTML = `
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          DevControl
        `;
      }
    }
  </script>
</body>
</html>
