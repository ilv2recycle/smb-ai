# Build Tailwind, bump version, deploy to GitHub Pages.
# Runs only when the push is NOT our own bump commit ([skip ci]), so we avoid a loop.

name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    concurrency:
      group: version-main-sequence
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Tailwind CSS
        run: npm ci && npm run css:build

      - name: Bump version
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          RELEASE_COMPARE_FROM_SHA: ${{ github.event.before }}
          RELEASE_COMPARE_TO_SHA: ${{ github.sha }}
          RELEASE_PUSH_SHA: ${{ github.sha }}
          RELEASE_ACTOR_LOGIN: ${{ github.actor }}
          RELEASE_BRANCH: main
          RELEASE_PUSHED_AT: ${{ github.event.head_commit.timestamp }}
          RELEASE_SOURCE: github-pages-deploy
        run: ./scripts/bump-version.sh --model ci

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No version changes (unexpected)" && exit 1 || true
          git commit -m "chore: bump version [skip ci]"
          git push origin main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
